name: KNX Web App — Tests

# Runs only on pull_request events (open, reopen, push to PR branch).
# This avoids double-running on pushes to branches that already have an open PR,
# and skips CI entirely for branches without a PR.
#
# Path filter: only fires when knx-web-app/ files are changed,
# so unrelated commits elsewhere in the monorepo are ignored.

on:
  pull_request:
    paths:
      - 'knx-web-app/**'

jobs:
  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: knx-web-app/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: knx-web-app/backend

      - name: Run backend tests
        run: npm test
        working-directory: knx-web-app/backend

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: knx-web-app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: knx-web-app/frontend

      - name: Run frontend tests
        run: npm test
        working-directory: knx-web-app/frontend
